services:
  postgres:
    image: postgres:16-alpine
    container_name: nobel-task5-postgres
    environment:
      POSTGRES_DB: nobel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nobel_task5_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nobel"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  nobel_task5_postgres_data:
